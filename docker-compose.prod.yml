services:
  web:
    build: .
    container_name: sesmt-web
    restart: always
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sesmt-net

  db:
    image: mariadb:10.11
    container_name: sesmt-db
    restart: always
    env_file:
      - .env
    volumes:
      - sesmt-dbdata:/var/lib/mysql
      - ./docker/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - sesmt-net

  backup:
    image: mariadb:10.11
    container_name: sesmt-backup
    restart: always
    env_file:
      - .env
    environment:
      - TZ=America/Sao_Paulo
    volumes:
      - ./storage/backups:/backups
      - ./storage:/storage:ro
    entrypoint: /bin/bash
    command: >
      -c "
      echo 'Backup agendado para 19:00 (America/Sao_Paulo)';
      while true; do
        HOUR=$$(date +%H);
        MIN=$$(date +%M);
        NOW_SEC=$$((HOUR * 3600 + MIN * 60));
        TARGET_SEC=$$((19 * 3600));
        if [ $$NOW_SEC -lt $$TARGET_SEC ]; then
          WAIT=$$((TARGET_SEC - NOW_SEC));
        else
          WAIT=$$((86400 - NOW_SEC + TARGET_SEC));
        fi;
        echo \"Proximo backup em $$((WAIT / 3600))h$$((WAIT % 3600 / 60))m\";
        sleep $$WAIT;
        TIMESTAMP=$$(date +%Y%m%d_%H%M%S);
        echo \"[$$TIMESTAMP] Iniciando backup...\";
        DB_OK=0; UP_OK=0; DB_SIZE=\"-\"; UP_SIZE=\"-\";
        if mariadb-dump -h db -u $$MARIADB_USER -p$$MARIADB_PASSWORD $$MARIADB_DATABASE --single-transaction --routines --triggers | gzip > /backups/db_$$TIMESTAMP.sql.gz.tmp; then
          mv /backups/db_$$TIMESTAMP.sql.gz.tmp /backups/db_$$TIMESTAMP.sql.gz;
          DB_SIZE=$$(du -h /backups/db_$$TIMESTAMP.sql.gz | cut -f1);
          DB_OK=1;
          echo \"[$$TIMESTAMP] Backup banco OK ($$DB_SIZE)\";
        else
          rm -f /backups/db_$$TIMESTAMP.sql.gz.tmp;
          echo \"[$$TIMESTAMP] ERRO no backup do banco\";
        fi;
        if tar czf /backups/storage_$$TIMESTAMP.tar.gz.tmp -C /storage uploads/ 2>/dev/null; then
          mv /backups/storage_$$TIMESTAMP.tar.gz.tmp /backups/storage_$$TIMESTAMP.tar.gz;
          UP_SIZE=$$(du -h /backups/storage_$$TIMESTAMP.tar.gz | cut -f1);
          UP_OK=1;
          echo \"[$$TIMESTAMP] Backup uploads OK ($$UP_SIZE)\";
        else
          rm -f /backups/storage_$$TIMESTAMP.tar.gz.tmp;
          echo \"[$$TIMESTAMP] ERRO no backup de uploads\";
        fi;
        find /backups -name 'db_*.sql.gz' -mtime +7 -delete;
        find /backups -name 'storage_*.tar.gz' -mtime +7 -delete;
        find /backups -name '*.tmp' -mtime +1 -delete;
        KEEP_DB=$$(ls /backups/db_*.sql.gz 2>/dev/null | wc -l);
        KEEP_UP=$$(ls /backups/storage_*.tar.gz 2>/dev/null | wc -l);
        if [ $$DB_OK -eq 1 ] && [ $$UP_OK -eq 1 ]; then
          STATUS=\"OK\";
          DESC=\"Backup automatico concluido. Banco: $$DB_SIZE. Uploads: $$UP_SIZE. Retidos: $$KEEP_DB banco, $$KEEP_UP uploads (7 dias).\";
        else
          STATUS=\"ERRO\";
          DESC=\"Backup automatico com falhas. Banco: $$([ $$DB_OK -eq 1 ] && echo OK || echo FALHOU). Uploads: $$([ $$UP_OK -eq 1 ] && echo OK || echo FALHOU).\";
        fi;
        mariadb -h db -u $$MARIADB_USER -p$$MARIADB_PASSWORD $$MARIADB_DATABASE -e \"INSERT INTO logs_acesso (usuario_id, acao, descricao, ip_address, criado_em) VALUES (NULL, 'backup', '$$STATUS - $$DESC', 'container:sesmt-backup', NOW());\" 2>/dev/null || echo \"[$$TIMESTAMP] Falha ao gravar log no banco\";
        echo \"[$$TIMESTAMP] Backup finalizado. $$DESC\";
        sleep 60;
      done
      "
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sesmt-net

volumes:
  sesmt-dbdata:
    driver: local

networks:
  sesmt-net:
    driver: bridge
