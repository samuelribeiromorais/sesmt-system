services:
  web:
    build: .
    container_name: sesmt-web
    restart: always
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sesmt-net

  db:
    image: mariadb:10.11
    container_name: sesmt-db
    restart: always
    env_file:
      - .env
    volumes:
      - sesmt-dbdata:/var/lib/mysql
      - ./docker/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - sesmt-net

  backup:
    image: mariadb:10.11
    container_name: sesmt-backup
    restart: always
    env_file:
      - .env
    volumes:
      - sesmt-backups:/backups
      - ./storage:/storage:ro
    entrypoint: /bin/bash
    command: >
      -c "
      while true; do
        TIMESTAMP=$$(date +%Y%m%d_%H%M%S);
        echo \"[$$TIMESTAMP] Iniciando backup...\";
        mariadb-dump -h db -u $$MARIADB_USER -p$$MARIADB_PASSWORD $$MARIADB_DATABASE | gzip > /backups/db_$$TIMESTAMP.sql.gz;
        tar czf /backups/storage_$$TIMESTAMP.tar.gz -C /storage uploads/ 2>/dev/null || true;
        find /backups -name 'db_*.sql.gz' -mtime +7 -delete;
        find /backups -name 'storage_*.tar.gz' -mtime +7 -delete;
        echo \"[$$TIMESTAMP] Backup concluido.\";
        sleep 86400;
      done
      "
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sesmt-net

volumes:
  sesmt-dbdata:
    driver: local
  sesmt-backups:
    driver: local

networks:
  sesmt-net:
    driver: bridge
